<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Controle de Férias - Regional Ampére</title>
    <style>
        :root {
            --bg-color: #0d0d10;
            --card-bg: #16161a;
            --text-color: #f3f4f6;
            --text-secondary: #9ca3af;
            --primary: #e50914; /* Vermelho Moderno */
            --primary-hover: #b80710;
            --danger: #ef4444;
            --warning: #f59e0b;
            --border: #24242b;
            --input-bg: #1f1f24;
        }

        body {
            font-family: 'Inter', 'Segoe UI', system-ui, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            padding: 24px;
            line-height: 1.5;
        }

        .container {
            max-width: 1280px;
            margin: 0 auto;
        }

        .alert-conflict {
            background-color: rgba(239, 68, 68, 0.1);
            border: 1px solid var(--danger);
            color: #fca5a5;
            padding: 16px;
            border-radius: 10px;
            margin-bottom: 24px;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 10px;
            box-shadow: 0 4px 12px rgba(239, 68, 68, 0.05);
        }

        h1, h2, h3 {
            font-weight: 700;
            letter-spacing: -0.02em;
        }

        h1 {
            text-align: center;
            text-transform: uppercase;
            font-size: 1.8rem;
            margin-bottom: 32px;
            color: var(--text-color);
            border-bottom: 2px solid var(--primary);
            padding-bottom: 12px;
            display: inline-block;
            left: 50%;
            transform: translateX(-50%);
            position: relative;
        }

        .dashboard {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 24px;
            margin-bottom: 32px;
        }

        @media (max-width: 768px) {
            .dashboard { grid-template-columns: 1fr; }
        }

        .panel {
            background: var(--card-bg);
            border-radius: 14px;
            padding: 24px;
            border: 1px solid var(--border);
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
        }

        .panel-returning { border-left: 4px solid var(--primary); }
        .panel-leaving { border-left: 4px solid var(--danger); }

        .panel h3 {
            margin-top: 0;
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 1.05rem;
            color: var(--text-color);
            margin-bottom: 16px;
        }

        .panel ul {
            list-style: none;
            padding: 0;
            margin: 0;
        }

        .panel li {
            padding: 12px 0;
            border-bottom: 1px solid var(--border);
            font-size: 0.95rem;
            color: var(--text-secondary);
        }

        .panel li:last-child { border-bottom: none; }
        .panel b { color: var(--text-color); }

        .form-section {
            background: var(--card-bg);
            padding: 28px;
            border-radius: 14px;
            margin-bottom: 32px;
            border: 1px solid var(--border);
        }

        .form-section h2 {
            margin-top: 0;
            font-size: 1.3rem;
            margin-bottom: 20px;
            color: var(--text-color);
            text-align: left;
        }

        .form-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 24px;
        }

        .form-group {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .form-group label {
            font-size: 0.75rem;
            color: var(--text-secondary);
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        .form-group input, .form-group select {
            background: var(--input-bg);
            border: 1px solid var(--border);
            padding: 12px;
            border-radius: 8px;
            color: var(--text-color);
            font-size: 0.95rem;
            transition: all 0.2s;
        }

        .form-group input:focus, .form-group select:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(229, 9, 20, 0.2);
        }

        button.btn-add {
            background: var(--primary);
            color: #fff;
            border: none;
            padding: 14px 24px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 600;
            font-size: 0.95rem;
            letter-spacing: 0.02em;
            width: 100%;
            transition: background 0.2s, transform 0.1s;
        }

        button.btn-add:hover { background: var(--primary-hover); }
        button.btn-add:active { transform: scale(0.99); }

        .table-responsive {
            overflow-x: auto;
            background: var(--card-bg);
            border-radius: 14px;
            margin-bottom: 48px;
            border: 1px solid var(--border);
        }

        table {
            width: 100%;
            border-collapse: collapse;
            text-align: left;
            font-size: 0.95rem;
        }

        th, td {
            padding: 16px 20px;
            border-bottom: 1px solid var(--border);
        }

        th {
            background: rgba(0, 0, 0, 0.3);
            color: var(--text-color);
            font-weight: 600;
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        tr:hover td {
            background: rgba(255, 255, 255, 0.01);
        }

        .btn-actions {
            display: flex;
            gap: 8px;
        }

        .btn-edit, .btn-delete {
            padding: 8px 14px;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-weight: 600;
            font-size: 0.8rem;
            transition: opacity 0.2s, transform 0.1s;
        }

        .btn-edit { background: #27272a; color: var(--text-color); border: 1px solid var(--border); }
        .btn-edit:hover { background: #3f3f46; }
        
        .btn-delete { background: var(--primary); color: #fff; }
        .btn-delete:hover { background: var(--primary-hover); }

        .btn-edit:active, .btn-delete:active { transform: scale(0.95); }

        h2.section-title {
            font-size: 1.4rem;
            margin-bottom: 24px;
            text-align: left;
            border-left: 4px solid var(--primary);
            padding-left: 12px;
        }

        .monthly-section {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 20px;
            margin-bottom: 40px;
        }

        .month-card {
            background: var(--card-bg);
            border-radius: 12px;
            padding: 20px;
            border: 1px solid var(--border);
        }

        .month-card h4 {
            margin-top: 0;
            color: var(--text-color);
            font-size: 1.05rem;
            border-bottom: 1px solid var(--border);
            padding-bottom: 10px;
            margin-bottom: 12px;
        }

        .month-card ul {
            list-style: none;
            padding: 0;
            margin: 0;
        }

        .month-card li {
            padding: 6px 0;
            font-size: 0.9rem;
            color: var(--text-secondary);
        }
    </style>
</head>
<body>

<div class="container">
    <div id="conflict-alert" class="alert-conflict" style="display: none;"></div>

    <div style="text-align: center;">
        <h1>Controle de Férias — Regional Ampére</h1>
    </div>

    <div class="dashboard">
        <div class="panel panel-returning">
            <h3>📅 Retornando em Breve (Próximos 7 Dias)</h3>
            <ul id="returning-list"></ul>
        </div>
        <div class="panel panel-leaving">
            <h3>⚠️ Saindo em Breve (Neste Mês)</h3>
            <ul id="leaving-list"></ul>
        </div>
    </div>

    <div class="form-section">
        <h2>Escala de Férias</h2>
        <div class="form-grid">
            <div class="form-group">
                <label>Colaborador *</label>
                <input type="text" id="worker-name" placeholder="Nome do técnico">
            </div>
            <div class="form-group">
                <label>Cidade *</label>
                <select id="worker-city">
                    <option value="Ampére">Ampére</option>
                    <option value="Capanema">Capanema</option>
                    <option value="Capitão">Capitão</option>
                    <option value="Dois Vizinhos">Dois Vizinhos</option>
                    <option value="Realeza">Realeza</option>
                </select>
            </div>
            <div class="form-group">
                <label>Período Aquisitivo *</label>
                <input type="text" id="worker-period" value="2025/2026">
            </div>
            <div class="form-group">
                <label>Dias *</label>
                <input type="number" id="worker-days" placeholder="Ex: 15">
            </div>
            <div class="form-group">
                <label>Início *</label>
                <input type="date" id="worker-start">
            </div>
        </div>
        <button class="btn-add" onclick="addItem()">ADICIONAR TÉCNICO</button>
    </div>

    <div class="table-responsive">
        <table>
            <thead>
                <tr>
                    <th>Colaborador</th>
                    <th>Cidade</th>
                    <th>Período Aquisitivo</th>
                    <th>Dias</th>
                    <th>Início das Férias</th>
                    <th>Fim das Férias</th>
                    <th>Ações</th>
                </tr>
            </thead>
            <tbody id="table-body"></tbody>
        </table>
    </div>

    <h2 class="section-title">Calendário de Férias por Mês</h2>
    <div id="monthly-calendar" class="monthly-section"></div>
</div>

<script>
    // Data base simulada conforme o sistema (03/07/2026)
    const currentDate = new Date(2026, 6, 3); 

    let vacationData = [
        { name: "Ederson", city: "Ampére", period: "2025/2026", days: 15, start: "2026-05-26" },
        { name: "Guilherme", city: "Ampére", period: "2025/2026", days: 20, start: "2026-06-15" },
        { name: "Marcos", city: "Ampére", period: "2025/2026", days: 15, start: "2027-01-04" },
        { name: "Valdenor", city: "Ampére", period: "2025/2026", days: 14, start: "2026-07-16" },
        { name: "Odair", city: "Capanema", period: "2025/2026", days: 20, start: "2026-07-22" },
        { name: "Vinicios", city: "Capanema", period: "2025/2026", days: 15, start: "2026-12-22" },
        { name: "Jose", city: "Capanema", period: "2025/2026", days: 15, start: "2026-07-24" },
        { name: "Renan", city: "Capitão", period: "2025/2026", days: 20, start: "2027-01-04" },
        { name: "Rodrigo", city: "Capitão", period: "2025/2026", days: 20, start: "2027-02-01" },
        { name: "Cleverson", city: "Dois Vizinhos", period: "2025/2026", days: 10, start: "2026-07-15" },
        { name: "Marcio", city: "Dois Vizinhos", period: "2025/2026", days: 20, start: "2026-12-21" },
        { name: "Samuel", city: "Dois Vizinhos", period: "2025/2026", days: 5, start: "2026-08-03" },
        { name: "Alessandro", city: "Realeza", period: "2025/2026", days: 15, start: "2026-12-17" },
        { name: "Serginho", city: "Realeza", period: "2025/2026", days: 10, start: "2026-05-25" },
        { name: "Tiago", city: "Realeza", period: "2025/2026", days: 30, start: "2027-11-01" } 
    ];

    function parseLocalDate(dateStr) {
        const [year, month, day] = dateStr.split('-');
        return new Date(year, month - 1, day);
    }

    function formatDate(date) {
        const day = String(date.getDate()).padStart(2, '0');
        const month = String(date.getMonth() + 1).padStart(2, '0');
        const year = date.getFullYear();
        return `${day}/${month}/${year}`;
    }

    function calculateEndDate(startStr, days) {
        const startDate = parseLocalDate(startStr);
        startDate.setDate(startDate.getDate() + parseInt(days) - 1);
        return startDate;
    }

    function renderAll() {
        renderTable();
        renderDashboard();
        renderCalendar();
        checkConflicts();
    }

    function renderTable() {
        const tbody = document.getElementById('table-body');
        tbody.innerHTML = '';

        vacationData.forEach((item, index) => {
            const start = parseLocalDate(item.start);
            const end = calculateEndDate(item.start, item.days);

            const tr = document.createElement('tr');
            tr.innerHTML = `
                <td><b>${item.name}</b></td>
                <td>${item.city}</td>
                <td>${item.period}</td>
                <td>${item.days}</td>
                <td>${formatDate(start)}</td>
                <td>${formatDate(end)}</td>
                <td>
                    <div class="btn-actions">
                        <button class="btn-edit" onclick="editItem(${index})">EDITAR</button>
                        <button class="btn-delete" onclick="deleteItem(${index})">DELETAR</button>
                    </div>
                </td>
            `;
            tbody.appendChild(tr);
        });
    }

    function renderDashboard() {
        const returningList = document.getElementById('returning-list');
        const leavingList = document.getElementById('leaving-list');
        returningList.innerHTML = '';
        leavingList.innerHTML = '';

        const currentYear = currentDate.getFullYear();
        const currentMonth = currentDate.getMonth();

        vacationData.forEach(item => {
            const start = parseLocalDate(item.start);
            const end = calculateEndDate(item.start, item.days);
            
            const diffTimeReturn = end.getTime() - currentDate.getTime();
            const diffDaysReturn = Math.ceil(diffTimeReturn / (1000 * 60 * 60 * 24));

            if (currentDate >= start && currentDate <= end) {
                if (diffDaysReturn >= 0 && diffDaysReturn <= 7) {
                    const li = document.createElement('li');
                    li.innerHTML = `O técnico <b>${item.name}</b> (${item.city}) encerra as férias em <b>${formatDate(end)}</b> (Falta(m) ${diffDaysReturn} dia(s)).`;
                    returningList.appendChild(li);
                }
            }

            if (start.getFullYear() === currentYear && start.getMonth() === currentMonth && start > currentDate) {
                const diffTimeLeave = start.getTime() - currentDate.getTime();
                const diffDaysLeave = Math.ceil(diffTimeLeave / (1000 * 60 * 60 * 24));
                
                const li = document.createElement('li');
                li.innerHTML = `O técnico <b>${item.name}</b> (${item.city}) inicia as férias em <b>${formatDate(start)}</b> (Em ${diffDaysLeave} dias).`;
                leavingList.appendChild(li);
            }
        });
    }

    function renderCalendar() {
        const container = document.getElementById('monthly-calendar');
        container.innerHTML = '';

        const monthsMap = {};
        const monthNames = ["Janeiro", "Fevereiro", "Março", "Abril", "Maio", "Junho", "Julho", "Agosto", "Setembro", "Outubro", "Novembro", "Dezembro"];

        vacationData.forEach(item => {
            const start = parseLocalDate(item.start);
            const end = calculateEndDate(item.start, item.days);

            let currentLoop = new Date(start.getFullYear(), start.getMonth(), 1);
            const endLimit = new Date(end.getFullYear(), end.getMonth(), 1);

            while (currentLoop <= endLimit) {
                const key = `${currentLoop.getFullYear()}-${String(currentLoop.getMonth() + 1).padStart(2, '0')}`;
                if (!monthsMap[key]) monthsMap[key] = [];
                monthsMap[key].push(item);
                currentLoop.setMonth(currentLoop.getMonth() + 1);
            }
        });

        const sortedKeys = Object.keys(monthsMap).sort();

        sortedKeys.forEach(key => {
            const [year, month] = key.split('-');
            const card = document.createElement('div');
            card.className = 'month-card';
            
            let html = `<h4>${monthNames[parseInt(month) - 1]} / ${year}</h4><ul>`;
            
            monthsMap[key].forEach(item => {
                const start = parseLocalDate(item.start);
                const end = calculateEndDate(item.start, item.days);
                html += `<li>• <b>${item.name}</b> (${item.city}) — ${formatDate(start)} a ${formatDate(end)}</li>`;
            });
            
            html += `</ul>`;
            card.innerHTML = html;
            container.appendChild(card);
        });
    }

    function checkConflicts() {
        const alertBox = document.getElementById('conflict-alert');
        alertBox.style.display = 'none';
        alertBox.innerHTML = '';

        for (let i = 0; i < vacationData.length; i++) {
            for (let j = i + 1; j < vacationData.length; j++) {
                const item1 = vacationData[i];
                const item2 = vacationData[j];

                if (item1.city === item2.city) {
                    const start1 = parseLocalDate(item1.start);
                    const end1 = calculateEndDate(item1.start, item1.days);
                    const start2 = parseLocalDate(item2.start);
                    const end2 = calculateEndDate(item2.start, item2.days);

                    if (start1 <= end2 && start2 <= end1) {
                        alertBox.innerHTML = `⚠️ Atenção: Conflito de férias em <u>${item1.city}</u> entre <b>${item1.name}</b> (${formatDate(start1)} a ${formatDate(end1)}) e <b>${item2.name}</b> (${formatDate(start2)} a ${formatDate(end2)})!`;
                        alertBox.style.display = 'flex';
                        return; 
                    }
                }
            }
        }
    }

    function addItem() {
        const name = document.getElementById('worker-name').value;
        const city = document.getElementById('worker-city').value;
        const period = document.getElementById('worker-period').value;
        const days = document.getElementById('worker-days').value;
        const start = document.getElementById('worker-start').value;

        if (!name || !days || !start) {
            alert("Por favor, preencha todos os campos obrigatórios.");
            return;
        }

        vacationData.push({ name, city, period, days, start });
        
        document.getElementById('worker-name').value = '';
        document.getElementById('worker-days').value = '';
        document.getElementById('worker-start').value = '';

        renderAll();
    }

    function deleteItem(index) {
        vacationData.splice(index, 1);
        renderAll();
    }

    function editItem(index) {
        const item = vacationData[index];
        document.getElementById('worker-name').value = item.name;
        document.getElementById('worker-city').value = item.city;
        document.getElementById('worker-period').value = item.period;
        document.getElementById('worker-days').value = item.days;
        document.getElementById('worker-start').value = item.start;
        
        vacationData.splice(index, 1);
        renderAll();
    }

    renderAll();
</script>
</body>
</html>
